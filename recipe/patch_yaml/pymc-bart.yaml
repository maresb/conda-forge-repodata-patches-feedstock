# pymc-bart 0.10.0 migrated from the monolithic `arviz` package to
# `arviz-stats`. Older pymc-bart releases still depend directly on
# pre-1.0 ArviZ APIs, so keep those records from solving with ArviZ >=1.0.
if:
  name: pymc-bart
  version_le: '0.9.2'
  timestamp_lt: 1779463370000
  has_depends: arviz?( *)
then:
  - tighten_depends:
      name: arviz
      upper_bound: '1.0'
