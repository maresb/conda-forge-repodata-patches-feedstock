# pymc-marketing 0.19.0 added the upstream bound `arviz >=0.13.0,<1.0.0`.
# Back-apply it to earlier releases so old pymc-marketing records do not
# solve with ArviZ >=1.0.
if:
  name: pymc-marketing
  version_lt: '0.19.0'
  timestamp_lt: 1779463370000
  has_depends: arviz?( *)
then:
  - tighten_depends:
      name: arviz
      upper_bound: '1.0.0'
